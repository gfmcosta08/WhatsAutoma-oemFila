# PostgreSQL só para desenvolvimento local (teste)
services:
  postgres:
    image: postgres:16-alpine
    container_name: lavajato-postgres-local
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lavajato
    ports:
      - "5433:5432"
    volumes:
      - lavajato_pgdata:/var/lib/postgresql/data

volumes:
  lavajato_pgdata:
