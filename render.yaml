# Blueprint Render — https://render.com/docs/blueprint-spec
# New > Blueprint > conecte gfmcosta08/WhatsAutoma-oemFila

databases:
  - name: oficina-db
    databaseName: oficina
    user: oficina

services:
  - type: keyvalue
    name: oficina-redis
    ipAllowList:
      - source: 0.0.0.0/0
        description: internal

  - type: web
    name: oficina-whatsapp
    runtime: node
    region: oregon
    buildCommand: npm install && npm run migrate
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "20.11.0"
      - key: DATABASE_URL
        fromDatabase:
          name: oficina-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: oficina-redis
          property: connectionString
      - key: WHATSAPP_PROVIDER
        value: auto
      # Brasil: use 55 se o webhook vier sem DDI (10–11 dígitos). sync: false = defina no painel se precisar.
      - key: WHATSAPP_DEFAULT_CC
        sync: false
      - key: UAZAPI_BASE_URL
        value: https://farollbr.uazapi.com
      - key: UAZAPI_AUTH_MODE
        value: auto
      - key: UAZAPI_INSTANCE_TOKEN
        sync: false
      - key: UAZAPI_ADMIN_TOKEN
        sync: false
      - key: UAZAPI_INSTANCE_PHONE
        sync: false
      - key: WHATSAPP_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_VERIFY_TOKEN
        sync: false
      - key: WHATSAPP_APP_SECRET
        sync: false
      - key: INTERNAL_NOTIFY_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: ENABLE_AGENDAMENTO
        value: "true"
      - key: WEBHOOK_BASE_URL
        sync: false
      - key: PUBLIC_WEB_BASE_URL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: SETTINGS_ENCRYPTION_KEY
        generateValue: true
      - key: ADMIN_SESSION_SECRET
        generateValue: true
